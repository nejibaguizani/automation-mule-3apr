name: Anypoint CLI Automation

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  cli:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      
      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4
        
      - name: Config Organization
        run: >
          anypoint-cli-v4 conf organization f8ab9797-5cce-4c5b-9eac-417c579ed4ba
      - name: Config Client Id
        run: >
          anypoint-cli-v4 conf client_id 1ed134b0a68548d79db4db72280e8d2f
      - name: Config Client Secret
        run: >
          anypoint-cli-v4 conf client_secret c23340F4a66b45e4B046691754Ca685C
      - name: List All Mule Apps
        run: >
          anypoint-cli-v4 runtime-mgr:application:list --environment Sandbox

      - name: Get metadata
        run: >
          anypoint-cli-v4 runtime-mgr:application:describe f5837557-0c82-408a-a16b-9fe866260ed9

      
        
     
